<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudySquad — транскрипция</title>
  <script>(function(){try{var t=localStorage.getItem("study_theme")||"dark";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","dark");}})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600&family=Manrope:wght@400;500;600;700&family=Oranienbaum&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #07080c; --surface: #10131b; --surface2: #171c27; --border: rgba(166,177,204,0.32); --accent: #b7d8d4; --accent2: #b8abce; --text: #f5f7ff; --muted: #a2a9bc; --radius: 16px; --success: #4ade80; --error: #f87171; --warning: #fbbf24; --font-display: 'Oranienbaum', serif; --font-ui: 'Manrope', sans-serif; --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-ui); }
    .bg { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 60% 40% at 50% 20%, rgba(183,216,212,0.08) 0%, transparent 60%), var(--bg); pointer-events: none; }
    .layout { position: relative; z-index: 1; display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
    .sidebar { border-right: 1px solid var(--border); padding: 24px 16px; display: flex; flex-direction: column; gap: 8px; position: sticky; top: 0; height: 100vh; }
    .logo { font-family: var(--font-display); font-size: 16px; font-weight: 700; padding: 8px 12px 20px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
    .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; font-size: 14px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.15s ease; text-decoration: none; }
    .nav-item:hover { background: var(--surface); color: var(--text); }
    .nav-item.active { background: rgba(183,216,212,0.12); color: var(--accent); }
    .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-bottom { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); }
    .user-block { display: flex; align-items: center; gap: 10px; padding: 10px 12px; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
    .user-name { font-size: 13px; font-weight: 600; }
    .logout-btn { font-size: 12px; color: var(--muted); cursor: pointer; padding: 4px 12px; border-radius: 6px; background: none; border: none; font-family: inherit; }
    .logout-btn:hover { color: var(--error); }
    .main { padding: 40px; display: flex; flex-direction: column; gap: 28px; max-width: 800px; }
    .back-link { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 14px; text-decoration: none; width: fit-content; }
    .back-link:hover { color: var(--text); }
    .header { display: flex; flex-direction: column; gap: 12px; }
    .meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .badge { font-family: var(--font-mono); letter-spacing: 0.02em; padding: 4px 10px; border-radius: 100px; font-size: 11px; font-weight: 600; }
    .badge-done { background: rgba(74,222,128,0.1); color: var(--success); }
    .badge-pending { background: rgba(251,191,36,0.1); color: #fbbf24; }
    .badge-processing { background: rgba(183,216,212,0.10); color: var(--accent); }
    .badge-error { background: rgba(248,113,113,0.1); color: var(--error); }
    .meta-text { font-size: 13px; color: var(--muted); }
    .page-title { font-family: var(--font-display); font-size: 24px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.2; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-primary { display: flex; align-items: center; gap: 8px; padding: 10px 20px; background: var(--accent); color: #07080c; border: none; border-radius: 10px; font-family: var(--font-ui); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-decoration: none; }
    .btn-primary:hover { background: #8fbeb9; transform: translateY(-1px); }
    .btn-secondary { display: flex; align-items: center; gap: 8px; padding: 10px 20px; background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 10px; font-family: var(--font-ui); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; text-decoration: none; }
    .btn-secondary:hover { background: var(--surface2); }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 4px; width: fit-content; }
    .tab-btn { padding: 8px 20px; border-radius: 8px; border: none; background: none; color: var(--muted); font-family: var(--font-ui); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
    .tab-btn.active { background: var(--surface2); color: var(--text); }
    .tab-btn:hover:not(.active) { color: var(--text); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Transcript card ── */
    .transcript-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .transcript-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .transcript-title { font-size: 14px; font-weight: 600; }
    .copy-btn { display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-family: var(--font-ui); font-size: 12px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .transcript-body { padding: 24px; font-size: 15px; line-height: 1.8; color: var(--text); white-space: pre-wrap; max-height: 500px; overflow-y: auto; font-family: var(--font-mono); font-size: 13px; }
    .transcript-body::-webkit-scrollbar { width: 6px; }
    .transcript-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Summary (Markdown) ── */
    .summary-body { padding: 28px; max-height: 600px; overflow-y: auto; line-height: 1.8; }
    .summary-body::-webkit-scrollbar { width: 6px; }
    .summary-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .summary-body h2 { font-family: var(--font-display); font-size: 22px; font-weight: 700; margin: 0 0 20px; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 12px; }
    .summary-body h3 { font-family: var(--font-ui); font-size: 16px; font-weight: 700; margin: 24px 0 10px; color: var(--accent); }
    .summary-body p { font-size: 15px; margin: 0 0 12px; color: var(--text); }
    .summary-body ul, .summary-body ol { padding-left: 20px; margin: 0 0 12px; }
    .summary-body li { font-size: 15px; margin-bottom: 6px; color: var(--text); }
    .summary-body strong { font-weight: 700; color: var(--text); }
    .summary-body em { font-style: italic; color: var(--muted); }
    .summary-body blockquote { border-left: 3px solid var(--accent); margin: 12px 0; padding: 10px 16px; background: rgba(183,216,212,0.06); border-radius: 0 8px 8px 0; font-style: italic; color: var(--muted); }
    .summary-body code { font-family: var(--font-mono); font-size: 13px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; }
    .summary-body hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

    /* ── States ── */
    .loading-state { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 60px 20px; text-align: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(183,216,212,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 15px; color: var(--muted); }
    .error-state { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 60px 20px; text-align: center; }
    .error-icon { font-size: 40px; }
    .error-text { font-size: 15px; color: var(--error); }
    .loading-skeleton { background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── Mobile ── */
    .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: rgba(7,8,12,0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border); padding: 8px 0 max(8px, env(safe-area-inset-bottom)); }
    .mobile-nav-inner { display: flex; justify-content: space-around; align-items: center; }
    .mobile-nav-item { font-family: var(--font-mono); letter-spacing: 0.02em; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 16px; font-size: 10px; font-weight: 600; color: var(--muted); text-decoration: none; min-width: 60px; }
    .mobile-nav-item .mnav-icon { font-size: 20px; line-height: 1; }
    .mobile-nav-item.active { color: var(--accent); }
    .mobile-header { display: none; position: sticky; top: 0; z-index: 50; background: rgba(7,8,12,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 16px 20px; align-items: center; justify-content: space-between; }
    .mobile-logo { font-family: var(--font-display); font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .mobile-back { color: var(--muted); font-size: 14px; text-decoration: none; display: flex; align-items: center; gap: 6px; }

    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .mobile-nav { display: block; }
      .mobile-header { display: flex; }
      .main { padding: 16px 16px 90px; max-width: 100%; gap: 20px; }
      .page-title { font-size: 18px; }
      .back-link { display: none; }
      .actions { flex-direction: column; }
      .btn-primary, .btn-secondary { justify-content: center; }
      .transcript-body { max-height: 350px; }
      .summary-body { max-height: 450px; padding: 20px; }
      .tabs { width: 100%; }
      .tab-btn { flex: 1; text-align: center; }
    }
  </style>
  <link rel="stylesheet" href="theme-3-1.css" />
  <script src="theme-switcher.js" defer></script>
</head>
<body>
  <div class="bg"></div>

  <div class="mobile-header">
    <a href="dashboard.html" class="mobile-back">← Назад</a>
    <div class="mobile-logo"><div class="logo-dot"></div>StudySquad</div>
    <div style="width:60px;"></div>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <div class="logo"><div class="logo-dot"></div>StudySquad</div>
      <a href="dashboard.html" class="nav-item"><span class="icon">🏠</span> Главная</a>
      <a href="upload.html" class="nav-item"><span class="icon">🎙️</span> Загрузить лекцию</a>
      <a href="#" class="nav-item nav-disabled" aria-disabled="true" tabindex="-1"><span class="icon">📚</span> Предметы</a>
      <a href="#" class="nav-item nav-disabled" aria-disabled="true" tabindex="-1"><span class="icon">👥</span> Моя группа</a>
      <a href="quizzes.html" class="nav-item"><span class="icon">🧠</span> Квизы</a>
      <div class="sidebar-bottom">
        <div class="user-block">
          <div class="avatar" id="avatarInitial">?</div>
          <div class="user-info"><div class="user-name" id="userName">...</div></div>
        </div>
        <button class="logout-btn" onclick="logout()">Выйти</button>
      </div>
    </aside>

    <main class="main">
      <a href="dashboard.html" class="back-link">← Назад</a>
      <div id="content">
        <div style="display:flex; flex-direction:column; gap:16px;">
          <div style="height:20px; width:200px;" class="loading-skeleton"></div>
          <div style="height:32px; width:80%;" class="loading-skeleton"></div>
          <div style="height:40px;" class="loading-skeleton"></div>
          <div style="height:300px;" class="loading-skeleton"></div>
        </div>
      </div>
    </main>
  </div>

  <nav class="mobile-nav">
    <div class="mobile-nav-inner">
      <a href="dashboard.html" class="mobile-nav-item">
        <span class="mnav-icon">🏠</span><span>Главная</span>
      </a>
      <a href="upload.html" class="mobile-nav-item">
        <span class="mnav-icon">🎙️</span><span>Загрузить</span>
      </a>
      <a href="quizzes.html" class="mobile-nav-item">
        <span class="mnav-icon">🧠</span><span>Квизы</span>
      </a>
    </div>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const CONFIG = { API_URL: 'https://d5dl1rb13ng0aicdmdk1.hsvi2zuh.apigw.yandexcloud.net' }
    const token = localStorage.getItem('token')
    const user = JSON.parse(localStorage.getItem('user') || 'null')
    if (!token) { window.location.href = 'index.html' }
    if (user) {
      document.getElementById('userName').textContent = user.name || user.email
      document.getElementById('avatarInitial').textContent = (user.name || user.email || '?')[0].toUpperCase()
    }

    const params = new URLSearchParams(window.location.search)
    const id = params.get('id')
    if (!id) { window.location.href = 'dashboard.html' }

    const statusMap = { done: ['badge-done', 'Готово'], pending: ['badge-pending', 'Ожидает'], processing: ['badge-processing', 'Обрабатывается...'], error: ['badge-error', 'Ошибка'] }

    async function loadTranscription() {
      try {
        const res = await fetch(`${CONFIG.API_URL}/transcriptions/${id}`, { headers: { Authorization: `Bearer ${token}` } })
        if (!res.ok) throw new Error('not found')
        const data = await res.json()
        render(data)
        if (data.status === 'pending' || data.status === 'processing') setTimeout(loadTranscription, 3000)
      } catch (e) {
        document.getElementById('content').innerHTML = `<div class="error-state"><div class="error-icon">⚠️</div><div class="error-text">Не удалось загрузить</div><a href="dashboard.html" style="color:var(--accent);font-size:14px;">← Вернуться</a></div>`
      }
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab))
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.dataset.panel === tab))
    }

    function render(data) {
      const [badgeCls, badgeLabel] = statusMap[data.status] || ['badge-pending', 'Ожидает']
      const date = new Date(data.created_at).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' })

      let contentBlock = ''

      if (data.status === 'done' && data.transcript) {
        const hasSummary = !!data.summary
        const summaryTab = hasSummary ? `
          <button class="tab-btn active" data-tab="summary" onclick="switchTab('summary')">📝 Конспект</button>
          <button class="tab-btn" data-tab="transcript" onclick="switchTab('transcript')">🎙️ Транскрипция</button>
        ` : `
          <button class="tab-btn active" data-tab="transcript" onclick="switchTab('transcript')">🎙️ Транскрипция</button>
        `

        const summaryPanel = hasSummary ? `
          <div class="tab-panel active" data-panel="summary">
            <div class="transcript-card">
              <div class="transcript-header">
                <div class="transcript-title">Конспект лекции</div>
                <button class="copy-btn" onclick="copySummary()">📋 Скопировать</button>
              </div>
              <div class="summary-body" id="summaryBody"></div>
            </div>
          </div>
        ` : ''

        const transcriptPanel = `
          <div class="tab-panel ${hasSummary ? '' : 'active'}" data-panel="transcript">
            <div class="transcript-card">
              <div class="transcript-header">
                <div class="transcript-title">Текст транскрипции</div>
                <button class="copy-btn" onclick="copyText()">📋 Скопировать</button>
              </div>
              <div class="transcript-body" id="transcriptText">${escapeHtml(data.transcript)}</div>
            </div>
          </div>
        `

        contentBlock = `
          <div class="tabs">${summaryTab}</div>
          ${summaryPanel}
          ${transcriptPanel}
        `

        // Рендерим markdown после вставки в DOM
        setTimeout(() => {
          if (hasSummary && data.summary) {
            const el = document.getElementById('summaryBody')
            if (el) el.innerHTML = marked.parse(data.summary)
          }
          // Сохраняем данные для копирования
          window._transcriptData = data
        }, 0)

      } else if (data.status === 'processing' || data.status === 'pending') {
        contentBlock = `<div class="transcript-card"><div class="loading-state"><div class="spinner"></div><div class="loading-text">Транскрипция готовится...<br/>Обычно 1-3 минуты</div></div></div>`
      } else if (data.status === 'error') {
        contentBlock = `<div class="transcript-card"><div class="error-state"><div class="error-icon">❌</div><div class="error-text">Не удалось обработать файл</div></div></div>`
      }

      document.getElementById('content').innerHTML = `
        <div class="header">
          <div class="meta">
            <span class="badge ${badgeCls}">${badgeLabel}</span>
            <span class="meta-text">${data.subject_name || 'Без предмета'}</span>
            <span class="meta-text">${date}</span>
            ${data.is_group ? '<span class="meta-text">👥 Групповая</span>' : ''}
          </div>
          <h1 class="page-title">${escapeHtml(data.title)}</h1>
          <div class="actions">
            ${data.status === 'done' ? `<button class="btn-primary" onclick="generateQuiz()">🧠 Создать квиз</button>` : ''}
            <a href="dashboard.html" class="btn-secondary">← Назад</a>
          </div>
        </div>
        ${contentBlock}`

      // Рендерим markdown после вставки блока в DOM
      if (data.status === 'done' && data.summary) {
        const el = document.getElementById('summaryBody')
        if (el) el.innerHTML = marked.parse(data.summary)
        window._transcriptData = data
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
    }

    function copyText() {
      const text = document.getElementById('transcriptText')?.innerText
      if (!text) return
      navigator.clipboard.writeText(text)
      const btn = document.querySelectorAll('.copy-btn')[document.querySelector('[data-panel="transcript"].active') ? 0 : 1]
      const allBtns = document.querySelectorAll('.copy-btn')
      allBtns.forEach(b => { if (b.onclick?.toString().includes('copyText')) { b.textContent = '✅ Скопировано'; setTimeout(() => b.textContent = '📋 Скопировать', 2000) } })
    }

    function copySummary() {
      const raw = window._transcriptData?.summary || ''
      if (!raw) return
      navigator.clipboard.writeText(raw)
      document.querySelectorAll('.copy-btn').forEach(b => {
        if (b.onclick?.toString().includes('copySummary')) {
          b.textContent = '✅ Скопировано'
          setTimeout(() => b.textContent = '📋 Скопировать', 2000)
        }
      })
    }

    async function generateQuiz() {
      const btn = document.querySelector('.btn-primary')
      btn.disabled = true; btn.textContent = '⏳ Генерируем...'
      try {
        const res = await fetch(`${CONFIG.API_URL}/quizzes`, {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ transcription_id: id, title: 'Квиз по лекции' })
        })
        const data = await res.json()
        if (!res.ok) throw new Error(data.error)
        window.location.href = `quiz.html?id=${data.quiz_id}`
      } catch (e) {
        alert('Не удалось создать квиз.')
        btn.disabled = false; btn.textContent = '🧠 Создать квиз'
      }
    }

    function logout() { localStorage.clear(); window.location.href = 'index.html' }
    loadTranscription()
  </script>
</body>
</html>
